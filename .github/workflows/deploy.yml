name: Deploy AlphaOS to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Only one concurrent deployment; skip in-progress runs
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    name: Build static export
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      # API routes require a running server and cannot be statically exported.
      # The app falls back to built-in static data when the API is unavailable.
      - name: Remove server-only API routes
        run: rm -rf src/app/api

      - name: Build static export
        run: npm run build
        env:
          # Supabase public vars — baked into the client bundle at build time
          NEXT_PUBLIC_SUPABASE_URL: https://mxwrfihmfmlhtmynpal.supabase.co
          NEXT_PUBLIC_SUPABASE_ANON_KEY: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im14d3JmaWlobWZtbGh0bXlucGFsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk4NjUyNjUsImV4cCI6MjA5NTQ0MTI2NX0.BR-aiF1QSS-L61ba35djVKIKeNiNfEZzzGxsXQSm8wI
          # No Polygon key here — live quotes only work via the local dev server
          NEXT_PUBLIC_API_URL: ""

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: out

  deploy:
    name: Deploy to GitHub Pages
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
